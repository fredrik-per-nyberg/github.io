<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fredriks Snake spel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
      overflow: auto;
      background: #000814;
    }

    /* ---- Animerad bakgrund ---- */
    #bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(26,0,60,0.8) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0,40,80,0.7) 0%, transparent 55%),
        radial-gradient(ellipse at 60% 80%, rgba(0,60,40,0.5) 0%, transparent 50%),
        linear-gradient(135deg, #000814 0%, #001233 50%, #000814 100%);
      z-index: 0;
    }

    #stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s);
    }

    @keyframes twinkle {
      0%   { opacity: 0.1; transform: scale(0.8); }
      100% { opacity: 0.9; transform: scale(1.2); }
    }

    #nebula {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
      pointer-events: none;
      background: conic-gradient(from 0deg at 30% 60%, transparent 0deg, rgba(78,204,163,0.04) 30deg, transparent 60deg);
      animation: rotateBg 30s linear infinite;
    }
    @keyframes rotateBg {
      from { transform: rotate(0deg) scale(2); }
      to   { transform: rotate(360deg) scale(2); }
    }

    /* ---- Spellayout ---- */
    #game-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px;
    }

    h1 {
      font-family: 'Segoe UI', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 8px;
      color: #4ecca3;
      text-shadow: 0 0 20px rgba(78,204,163,0.6);
    }

    #scoreboard {
      display: flex;
      gap: 24px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .score-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(78,204,163,0.3);
      border-radius: 8px;
      padding: 6px 18px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .score-box label { color: rgba(255,255,255,0.5); font-size: 0.8rem; }
    .score-box span  { color: #4ecca3; font-size: 1.2rem; font-weight: bold; }

    /* ---- Canvas-kort ---- */
    #card {
      position: relative;
      border-radius: 16px;
      padding: 4px;
      background: linear-gradient(135deg, rgba(78,204,163,0.5), rgba(0,100,200,0.3), rgba(78,204,163,0.2));
      box-shadow:
        0 0 40px rgba(78,204,163,0.25),
        0 0 80px rgba(78,204,163,0.1);
    }
    #card-inner {
      border-radius: 13px;
      overflow: hidden;
      position: relative;
      width: 400px;
      height: 400px;
    }
    canvas {
      display: block;
      width: 400px;
      height: 400px;
      background: #020c18;
    }

    /* ---- Overlay ---- */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-radius: 13px;
      background: rgba(2, 12, 24, 0.85);
    }
    #overlay.hidden { display: none; }
    #overlay h2 {
      font-size: 2rem;
      color: #4ecca3;
      text-shadow: 0 0 20px rgba(78,204,163,0.8);
      letter-spacing: 4px;
    }
    #overlay p {
      color: rgba(255,255,255,0.55);
      font-size: 1rem;
      letter-spacing: 1px;
    }
    #start-btn {
      margin-top: 8px;
      padding: 12px 36px;
      background: linear-gradient(135deg, #4ecca3, #38b48e);
      color: #000d1a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 0 20px rgba(78,204,163,0.5);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 32px rgba(78,204,163,0.8);
    }
    #start-btn:active { transform: scale(0.97); }

    #hint {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ---- Påskhare ---- */
    #easter-bunny {
      position: fixed;
      bottom: 40px;
      right: 60px;
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    #easter-bunny.show {
      display: flex;
      animation: bunnyPop 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    #easter-bunny p {
      font-size: 1rem;
      color: #ffcce0;
      text-shadow: 0 0 10px rgba(255,150,200,0.8);
      margin-top: 6px;
      letter-spacing: 1px;
    }
    @keyframes bunnyPop {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="bg"></div>
  <div id="nebula"></div>
  <div id="stars"></div>

  <!-- Påskhare -->
  <div id="easter-bunny">
    <svg width="120" height="150" viewBox="0 0 120 150" fill="none">
      <ellipse cx="42" cy="38" rx="12" ry="32" fill="#f9d0e0" stroke="#e8a0c0" stroke-width="2"/>
      <ellipse cx="42" cy="38" rx="6" ry="24" fill="#ffb0d0"/>
      <ellipse cx="78" cy="38" rx="12" ry="32" fill="#f9d0e0" stroke="#e8a0c0" stroke-width="2"/>
      <ellipse cx="78" cy="38" rx="6" ry="24" fill="#ffb0d0"/>
      <ellipse cx="60" cy="108" rx="34" ry="38" fill="#f9d0e0" stroke="#e8a0c0" stroke-width="2"/>
      <ellipse cx="60" cy="72" rx="28" ry="26" fill="#f9d0e0" stroke="#e8a0c0" stroke-width="2"/>
      <ellipse cx="60" cy="112" rx="20" ry="24" fill="#fff0f6"/>
      <circle cx="50" cy="68" r="5" fill="#fff"/>
      <circle cx="70" cy="68" r="5" fill="#fff"/>
      <circle cx="51" cy="68" r="3" fill="#222"/>
      <circle cx="71" cy="68" r="3" fill="#222"/>
      <circle cx="52" cy="67" r="1" fill="#fff"/>
      <circle cx="72" cy="67" r="1" fill="#fff"/>
      <ellipse cx="60" cy="77" rx="4" ry="3" fill="#ff80a8"/>
      <path d="M56 80 Q60 84 64 80" stroke="#cc6090" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <line x1="36" y1="76" x2="54" y2="78" stroke="#cc8080" stroke-width="1"/>
      <line x1="36" y1="80" x2="54" y2="79" stroke="#cc8080" stroke-width="1"/>
      <line x1="84" y1="76" x2="66" y2="78" stroke="#cc8080" stroke-width="1"/>
      <line x1="84" y1="80" x2="66" y2="79" stroke="#cc8080" stroke-width="1"/>
      <circle cx="88" cy="130" r="9" fill="#fff0f6" stroke="#e8a0c0" stroke-width="1.5"/>
      <ellipse cx="44" cy="143" rx="12" ry="6" fill="#f0b8d0" stroke="#e8a0c0" stroke-width="1.5"/>
      <ellipse cx="76" cy="143" rx="12" ry="6" fill="#f0b8d0" stroke="#e8a0c0" stroke-width="1.5"/>
      <ellipse cx="30" cy="110" rx="10" ry="13" fill="#ffe066" stroke="#f0c030" stroke-width="1.5"/>
      <path d="M22 108 Q30 103 38 108" stroke="#f0c030" stroke-width="1.2" fill="none"/>
      <path d="M21 113 Q30 118 39 113" stroke="#f0c030" stroke-width="1.2" fill="none"/>
      <circle cx="30" cy="106" r="2" fill="#ff6b6b"/>
      <circle cx="27" cy="112" r="2" fill="#4ecca3"/>
      <circle cx="33" cy="115" r="2" fill="#a78bfa"/>
    </svg>
    <p>Grattis! 🐣</p>
  </div>

  <div id="game-wrapper">
    <h1>Fredriks Snake</h1>

    <div id="scoreboard">
      <div class="score-box">
        <label>Poäng</label>
        <span id="score">0</span>
      </div>
      <div class="score-box">
        <label>Rekord</label>
        <span id="high-score">0</span>
      </div>
    </div>

    <div id="card">
      <div id="card-inner">
        <canvas id="canvas" width="400" height="400"></canvas>
        <div id="overlay">
          <h2 id="overlay-title">SNAKE</h2>
          <p id="overlay-sub">Använd piltangenterna för att styra</p>
          <button id="start-btn">STARTA</button>
          <p id="hint">P = Paus</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Stjärnor
    (function() {
      var starsEl = document.getElementById('stars');
      for (var i = 0; i < 120; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        var size = Math.random() * 2.5 + 0.5;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = (Math.random() * 100) + '%';
        s.style.top = (Math.random() * 100) + '%';
        s.style.setProperty('--d', (Math.random() * 4 + 2).toFixed(1) + 's');
        s.style.setProperty('--delay', (Math.random() * 5).toFixed(1) + 's');
        s.style.opacity = (Math.random() * 0.7 + 0.1).toString();
        starsEl.appendChild(s);
      }
    })();

    // Spel
    (function() {
      var canvas = document.getElementById('canvas');
      var ctx = canvas.getContext('2d');
      var overlay = document.getElementById('overlay');
      var overlayTitle = document.getElementById('overlay-title');
      var overlaySub = document.getElementById('overlay-sub');
      var startBtn = document.getElementById('start-btn');
      var scoreEl = document.getElementById('score');
      var highScoreEl = document.getElementById('high-score');
      var bunnyEl = document.getElementById('easter-bunny');

      var GRID = 20;
      var COLS = canvas.width / GRID;
      var ROWS = canvas.height / GRID;

      var snake = [];
      var dir = { x: 1, y: 0 };
      var nextDir = { x: 1, y: 0 };
      var food = { x: 5, y: 5 };
      var score = 0;
      var highScore = 0;
      var gameLoop = null;
      var running = false;
      var paused = false;
      var particles = [];
      var foodPulse = 0;
      var bunnyTimer = null;

      function init() {
        snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        paused = false;
        particles = [];
        foodPulse = 0;
        scoreEl.textContent = '0';
        spawnFood();
        draw();
      }

      function spawnFood() {
        var pos;
        var attempts = 0;
        do {
          pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
          attempts++;
        } while (snake.some(function(s) { return s.x === pos.x && s.y === pos.y; }) && attempts < 500);
        food = pos;
      }

      function spawnParticles(x, y) {
        for (var i = 0; i < 14; i++) {
          var angle = (Math.PI * 2 / 14) * i + Math.random() * 0.3;
          var speed = Math.random() * 2.5 + 1;
          particles.push({
            x: x * GRID + GRID / 2,
            y: y * GRID + GRID / 2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            decay: Math.random() * 0.05 + 0.04,
            size: Math.random() * 3 + 1,
            hue: Math.floor(Math.random() * 60 + 140)
          });
        }
      }

      function showBunny() {
        if (bunnyTimer) clearTimeout(bunnyTimer);
        bunnyEl.classList.add('show');
        bunnyTimer = setTimeout(function() {
          bunnyEl.classList.remove('show');
          bunnyTimer = null;
        }, 2000);
      }

      function update() {
        if (paused) return;

        dir = { x: nextDir.x, y: nextDir.y };
        var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
          gameOver();
          return;
        }
        for (var i = 0; i < snake.length; i++) {
          if (snake[i].x === head.x && snake[i].y === head.y) {
            gameOver();
            return;
          }
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          score++;
          scoreEl.textContent = score.toString();
          if (score > highScore) {
            highScore = score;
            highScoreEl.textContent = highScore.toString();
          }
          if (score === 3) showBunny();
          spawnParticles(food.x, food.y);
          spawnFood();
        } else {
          snake.pop();
        }

        foodPulse += 0.12;

        var alive = [];
        for (var j = 0; j < particles.length; j++) {
          var p = particles[j];
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.92;
          p.vy *= 0.92;
          p.life -= p.decay;
          if (p.life > 0) alive.push(p);
        }
        particles = alive;

        draw();
      }

      function drawRoundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#020c18';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Rutnät
        ctx.strokeStyle = 'rgba(78,204,163,0.06)';
        ctx.lineWidth = 0.5;
        for (var gx = 0; gx <= canvas.width; gx += GRID) {
          ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, canvas.height); ctx.stroke();
        }
        for (var gy = 0; gy <= canvas.height; gy += GRID) {
          ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke();
        }

        // Mat
        var pulse = 1 + Math.sin(foodPulse) * 0.15;
        var fx = food.x * GRID + GRID / 2;
        var fy = food.y * GRID + GRID / 2;
        var fr = (GRID / 2 - 2) * pulse;

        ctx.save();
        ctx.shadowColor = '#ff6b6b';
        ctx.shadowBlur = 18 * pulse;
        var foodGrad = ctx.createRadialGradient(fx - 2, fy - 2, 1, fx, fy, Math.max(fr, 1));
        foodGrad.addColorStop(0, '#ffb3b3');
        foodGrad.addColorStop(1, '#ff3355');
        ctx.fillStyle = foodGrad;
        ctx.beginPath();
        ctx.arc(fx, fy, Math.max(fr, 1), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Orm
        for (var i = 0; i < snake.length; i++) {
          var seg = snake[i];
          var isHead = i === 0;
          var t = 1 - i / Math.max(snake.length, 1);
          var px = seg.x * GRID + 2;
          var py = seg.y * GRID + 2;
          var sz = GRID - 4;
          var radius = isHead ? 7 : 5;

          ctx.save();
          ctx.shadowColor = isHead ? 'rgba(78,204,163,0.9)' : 'rgba(78,204,163,0.3)';
          ctx.shadowBlur = isHead ? 16 : 6;

          var segGrad = ctx.createLinearGradient(px, py, px + sz, py + sz);
          if (isHead) {
            segGrad.addColorStop(0, '#a8ffdc');
            segGrad.addColorStop(1, '#4ecca3');
          } else {
            var alpha = 0.35 + t * 0.65;
            segGrad.addColorStop(0, 'rgba(120,255,200,' + alpha + ')');
            segGrad.addColorStop(1, 'rgba(40,160,120,' + alpha + ')');
          }
          ctx.fillStyle = segGrad;
          drawRoundRect(px, py, sz, sz, radius);
          ctx.fill();
          ctx.restore();
        }

        // Ögon
        if (snake.length > 0) {
          var hx = snake[0].x * GRID;
          var hy = snake[0].y * GRID;
          var eyes;
          if (dir.x !== 0) {
            eyes = [
              { x: GRID * 0.55, y: GRID * 0.28 },
              { x: GRID * 0.55, y: GRID * 0.72 }
            ];
          } else {
            eyes = [
              { x: GRID * 0.28, y: GRID * 0.45 },
              { x: GRID * 0.72, y: GRID * 0.45 }
            ];
          }
          for (var ei = 0; ei < eyes.length; ei++) {
            ctx.fillStyle = '#001a0d';
            ctx.beginPath();
            ctx.arc(hx + eyes[ei].x, hy + eyes[ei].y, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(hx + eyes[ei].x - 0.5, hy + eyes[ei].y - 0.5, 1, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Partiklar
        for (var pi = 0; pi < particles.length; pi++) {
          var part = particles[pi];
          ctx.save();
          ctx.globalAlpha = Math.max(0, part.life);
          var partColor = 'hsl(' + part.hue + ', 100%, 65%)';
          ctx.fillStyle = partColor;
          ctx.shadowColor = partColor;
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(part.x, part.y, part.size * part.life, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function gameOver() {
        if (gameLoop) {
          clearInterval(gameLoop);
          gameLoop = null;
        }
        running = false;
        overlayTitle.textContent = 'GAME OVER';
        overlaySub.textContent = 'Du fick ' + score + ' poäng';
        startBtn.textContent = 'SPELA IGEN';
        startBtn.style.display = '';
        overlay.classList.remove('hidden');
      }

      function startGame() {
        overlay.classList.add('hidden');
        init();
        running = true;
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(update, 115);
      }

      startBtn.addEventListener('click', startGame);

      document.addEventListener('keydown', function(e) {
        if (!running) return;

        switch (e.key) {
          case 'ArrowUp':
            if (dir.y !== 1) nextDir = { x: 0, y: -1 };
            e.preventDefault();
            break;
          case 'ArrowDown':
            if (dir.y !== -1) nextDir = { x: 0, y: 1 };
            e.preventDefault();
            break;
          case 'ArrowLeft':
            if (dir.x !== 1) nextDir = { x: -1, y: 0 };
            e.preventDefault();
            break;
          case 'ArrowRight':
            if (dir.x !== -1) nextDir = { x: 1, y: 0 };
            e.preventDefault();
            break;
          case 'p':
          case 'P':
            paused = !paused;
            if (paused) {
              overlayTitle.textContent = 'PAUS';
              overlaySub.textContent = 'Tryck P för att fortsätta';
              startBtn.style.display = 'none';
              overlay.classList.remove('hidden');
            } else {
              overlay.classList.add('hidden');
            }
            break;
        }
      });
    })();
  </script>
</body>
</html>
